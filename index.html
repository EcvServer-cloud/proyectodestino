<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Destino — Novela Visual</title>
<style>
/* ==========================================================================
   RESET Y BASE
   ========================================================================== */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height:100%;
  background:#050608;
  font-family:'Courier New', Courier, monospace;
  overflow:hidden;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ==========================================================================
   MARCO DEL JUEGO
   Nota: ya no simula un teléfono; es simplemente un rectángulo redondeado
   de tamaño fijo, centrado, con sombra suave. La forma exacta no es
   relevante para la mecánica, solo contiene la pantalla de juego.
   ========================================================================== */
#marco-telefono{
  position:relative;
  width:380px;
  height:760px;
  background:#000;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  overflow:hidden;
}

#pantalla-juego{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  border-radius:20px;
  background:#111;
}

/* ==========================================================================
   BARRA DE DESCENSO (indicador de impacto, sin cronómetro numérico)
   ========================================================================== */
#barra-descenso-contenedor{
  position:absolute;
  top:35px; left:0; right:0;
  height:5px;
  background:rgba(0,0,0,.35);
  z-index:50;
}
#barra-descenso{
  height:100%;
  width:0%;
  background:#e53935;
  box-shadow:0 0 8px #e53935;
  transition:width .15s linear;
}

/* ==========================================================================
   ENCABEZADO: ciudad / población / fecha
   ========================================================================== */
#encabezado{
  position:absolute;
  top:45px; left:16px; right:16px;
  z-index:40;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  color:#0e1a12;
  text-transform:uppercase;
  font-weight:bold;
  letter-spacing:1px;
  pointer-events:none;
}
#encabezado .linea{ font-size:15px; line-height:1.35; text-shadow:0 1px 0 rgba(255,255,255,.15); }
#texto-fecha{ font-size:13px; }

/* ==========================================================================
   ESCENA: cielo, ciudad, misil y explosión
   ========================================================================== */
#escena{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center bottom;
  background-repeat:no-repeat;
  transition:background-image .6s ease;
}

#img-ciudad{
  position:absolute;
  left:0; right:0; bottom:150px;
  width:100%;
  display:block;
  pointer-events:none;
  z-index:5;
  opacity:1;
  transition:opacity .4s ease;
}

#img-bomba{
  position:absolute;
  left:50%;
  top:22%;
  width:70px;
  transform:translate(-50%,0) rotate(0deg) scale(1);
  z-index:10;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.5));
  pointer-events:none;
  opacity:1;
  transition:opacity .4s ease;
}

/* Imagen de explosión: sustituye ciudad + misil al detonar o al impactar */
#img-explosion{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center bottom;
  z-index:15;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s ease;
}
#img-explosion.visible{ opacity:1; }

/* icono de alerta parpadeante (esquina, durante la alarma) */
#icono-alerta{
  position:absolute;
  bottom:210px; left:14px;
  width:34px;
  z-index:12;
  opacity:0;
  pointer-events:none;
  animation:parpadeoAlerta 1s infinite;
}
#icono-alerta img{ width:100%; display:block; }
#icono-alerta.activo{ display:block; }
#icono-alerta:not(.activo){ display:none; }
@keyframes parpadeoAlerta{
  0%,100%{ opacity:0; }
  50%{ opacity:1; }
}

/* ==========================================================================
   BOTÓN DE INFORMACIÓN
   ========================================================================== */
#boton-info{
  position:absolute;
  top:85px; right:14px;
  width:64px; height:64px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:45;
  box-shadow:0 6px 14px rgba(0,0,0,.35);
  transition:transform .15s ease, background .4s ease;
}
#boton-info:active{ transform:scale(.92); }
#boton-info svg{ width:30px; height:30px; }

/* ==========================================================================
   BOTONES INFERIORES (decisiones dinámicas)
   ========================================================================== */
#botones-inferiores{
  position:absolute;
  left:0; right:0; bottom:0;
  min-height:150px;
  background:#152238;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:34px;
  padding:18px 20px;
  z-index:40;
  transition:opacity .4s ease, visibility .4s ease;
}
#botones-inferiores.oculto{ opacity:0; visibility:hidden; pointer-events:none; }

.boton-decision{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  background:none;
  border:none;
  cursor:pointer;
  color:#fff;
  font-family:inherit;
}
.boton-decision:active .circulo-boton{ transform:scale(.9); }

.circulo-boton{
  width:80px; height:80px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 14px rgba(0,0,0,.4);
  transition:transform .15s ease;
}
.circulo-boton svg{ width:38px; height:38px; }

.etiqueta-boton{
  font-weight:bold;
  font-size:14px;
  letter-spacing:1px;
  text-transform:uppercase;
}

/* ==========================================================================
   PANEL DE DOCUMENTOS (carrusel de imágenes)
   ========================================================================== */
#panel-documentos{
  position:absolute;
  inset:0;
  z-index:60;
  background:rgba(5,8,12,.94);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:70px 20px 30px;
  opacity:0;
  visibility:hidden;
  transition:opacity .35s ease, visibility .35s ease;
}
#panel-documentos.visible{ opacity:1; visibility:visible; }

#boton-cerrar-documentos{
  position:absolute;
  top:16px; right:16px;
  width:40px; height:40px;
  border-radius:50%;
  background:rgba(255,255,255,.12);
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

#contenedor-carrusel{
  position:relative;
  width:100%;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

#imagen-documento{
  max-width:100%;
  max-height:100%;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  object-fit:contain;
  transition:opacity .25s ease;
}

.flecha-carrusel{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:44px; height:44px;
  border-radius:50%;
  background:rgba(255,255,255,.12);
  border:none;
  color:#f5d59a;
  font-size:20px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  z-index:5;
}
.flecha-carrusel:disabled{ opacity:.25; cursor:default; }
#flecha-izquierda{ left:0; }
#flecha-derecha{ right:0; }

#indicador-documentos{
  margin-top:14px;
  color:#9aa3ad;
  font-size:12px;
  letter-spacing:2px;
}

#mensaje-sin-documentos{
  color:#8b95a1;
  font-size:14px;
  text-align:center;
  letter-spacing:1px;
}

/* ==========================================================================
   TRANSICIONES: destello blanco / pantalla negra / texto de consecuencia
   ========================================================================== */
#capa-destello{
  position:absolute; inset:0;
  background:#fff;
  opacity:0;
  z-index:90;
  pointer-events:none;
}

#capa-negra{
  position:absolute; inset:0;
  background:#000;
  opacity:0;
  z-index:80;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:26px;
  padding:40px;
  pointer-events:none;
  transition:opacity .8s ease;
}
#capa-negra.visible{ opacity:1; pointer-events:auto; }

#texto-consecuencia{
  color:#e7e7e7;
  font-size:16px;
  line-height:1.7;
  text-align:center;
  letter-spacing:.5px;
  opacity:0;
  white-space:pre-line;
  transition:opacity 1s ease;
}
#texto-consecuencia.visible{ opacity:1; }

/* Botón "Continuar": el jugador avanza cuando termina de leer, en vez de
   que el motor lo obligue a avanzar tras un tiempo fijo. */
#boton-continuar{
  padding:14px 34px;
  border-radius:30px;
  border:2px solid #f5d59a;
  background:transparent;
  color:#f5d59a;
  font-family:inherit;
  font-weight:bold;
  letter-spacing:2px;
  font-size:13px;
  text-transform:uppercase;
  cursor:pointer;
  opacity:0;
  visibility:hidden;
  transform:translateY(6px);
  transition:opacity .5s ease, transform .5s ease, visibility .5s ease;
}
#boton-continuar.visible{ opacity:1; visibility:visible; transform:translateY(0); }
#boton-continuar:active{ background:#f5d59a; color:#111; }

/* vibración visual de la pantalla (impacto / decisión) */
@keyframes vibracionPantalla{
  0%,100%{ transform:translate(0,0); }
  20%{ transform:translate(-4px,3px); }
  40%{ transform:translate(4px,-3px); }
  60%{ transform:translate(-3px,-2px); }
  80%{ transform:translate(3px,2px); }
}
.vibrando{ animation:vibracionPantalla .4s linear 2; }

/* ==========================================================================
   PANTALLA DE INICIO ("toca para comenzar")
   ----------------------------------------------------------------------------
   Los navegadores bloquean el audio con sonido hasta que ocurre un gesto
   real del usuario (un toque/clic). Por eso el capítulo 1 no sonaba: el
   motor arrancaba solo, sin gesto previo. Esta pantalla exige un toque
   antes de iniciar el capítulo 1, y ese mismo toque habilita el audio
   para el resto de la partida.
   ========================================================================== */
#pantalla-carga{
  position:absolute; inset:0;
  background:#050608;
  color:#e7e7e7;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  letter-spacing:3px;
  z-index:200;
  text-transform:uppercase;
  text-align:center;
  cursor:pointer;
  transition:opacity .4s ease;
}
#pantalla-carga span{ animation:parpadeoAlerta 1.6s infinite; }
</style>
</head>
<body>

<div id="marco-telefono">
  <div id="pantalla-juego">

    <!-- Pantalla de inicio: requiere un toque para habilitar el audio -->
    <div id="pantalla-carga"><span>TOCA PARA<br>COMENZAR</span></div>

    <!-- Barra superior de descenso -->
    <div id="barra-descenso-contenedor">
      <div id="barra-descenso"></div>
    </div>

    <!-- Encabezado narrativo -->
    <div id="encabezado">
      <div>
        <div class="linea" id="texto-ciudad">CIUDAD:</div>
        <div class="linea" id="texto-poblacion">POBLACIÓN:</div>
      </div>
      <div id="texto-fecha">FECHA</div>
    </div>

    <!-- Escena: cielo + ciudad + misil + explosión -->
    <div id="escena">
      <div id="icono-alerta"><img src="src/alertaomega.png" alt="alerta"></div>
      <img id="img-ciudad" src="" alt="ciudad">
      <img id="img-bomba" src="" alt="misil">
      <img id="img-explosion" src="" alt="explosión">
    </div>

    <!-- Botón de información -->
    <div id="boton-info" title="Información">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 3h9l6 6v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" fill="#0e1a12"/>
        <circle cx="12" cy="9" r="1.4" fill="#fff"/>
        <rect x="10.8" y="11.5" width="2.4" height="6" rx="1.1" fill="#fff"/>
      </svg>
    </div>

    <!-- Botones inferiores (decisiones dinámicas) -->
    <div id="botones-inferiores"></div>

    <!-- Panel de documentos -->
    <div id="panel-documentos">
      <button id="boton-cerrar-documentos">✕</button>
      <div id="contenedor-carrusel">
        <button class="flecha-carrusel" id="flecha-izquierda">&#10094;</button>
        <img id="imagen-documento" src="" alt="documento">
        <div id="mensaje-sin-documentos" style="display:none;">No hay documentos disponibles.</div>
        <button class="flecha-carrusel" id="flecha-derecha">&#10095;</button>
      </div>
      <div id="indicador-documentos"></div>
    </div>

    <!-- Capas de transición -->
    <div id="capa-destello"></div>
    <div id="capa-negra">
      <div id="texto-consecuencia"></div>
      <button id="boton-continuar">Continuar</button>
    </div>

  </div>
</div>

<script>
(function(){
"use strict";

/* ============================================================================
   1. DATOS NARRATIVOS — CAPÍTULOS
   ============================================================================ */
const CAPITULOS = [
  {
    id: 1,
    nombre: "Nueva Alexandria",
    fecha: "25 diciembre 2345",
    ciudad: "Nueva Alexandria",
    poblacion: "2 millones",
    lineaTemporal: "A",
    fondo: "src/fondocielonuevaalexandria.png",
    ciudadPNG: "src/ciudadnuevaalexandria.png",
    bombaPNG: "src/bombagrisactiva.png",
    bombaPNGDetenida: "src/bombagrisdesactivada.png",
    documentos: [
      "src/documento1capitulo1.png",
      "src/documento2capitulo1.png",
      "src/documento3capitulo1.png",
      "src/documento4capitulo1.png",
      "src/documento5capitulo1.png"
    ],
    sonidoAmbiente: "src/ambientedeciudad.mp3",
    sonidoAlarma: "src/sonidoalerta2.mp3",
    colorCielo: "#8fe8ee",
    colorInfo: "#2b9fe0",
    tiempoDescenso: 30000,
    botones: [
      {
        id: "detener",
        texto: "DETENER",
        color: "#43b53f",
        icono: "mano",
        textoConsecuencia: "El Misil se desactivo ya no es mas que chatarra.\nEres el heroe de Nueva Alexandria.",
        siguiente: 2
      },
      {
        id: "detonar",
        texto: "DETONAR",
        color: "#d32f2f",
        icono: "radiacion",
        porDefecto: true,
        textoConsecuencia: "Detonaste la bomba.\nNueva Alexandria ahora es un crater radioactivo.",
        siguiente: 2
      }
    ]
  },
  {
    id: 2,
    nombre: "Somorra",
    fecha: "27 diciembre 2345",
    ciudad: "Somorra",
    poblacion: "5 millones",
    lineaTemporal: "A",
    fondo: "src/fondocielosomorra.png",
    ciudadPNG: "src/ciudadsomorra.png",
    bombaPNG: "src/bombaroja.png",
    bombaPNGDetenida: "src/bombaroja.png",
    documentos: [
       "src/documento1capitulo2.png",
       "src/documento2capitulo2.png",
       "src/documento3capitulo2.png",
       "src/documento4capitulo2.png",
       "src/documento5capitulo2.png"
    ],
    sonidoAmbiente: "src/ambientedeciudad.mp3",
    sonidoAlarma: "src/sonidoalerta2.mp3",
    colorCielo: "#5f7a7c",
    colorInfo: "#ffe1b3",
    tiempoDescenso: 30000,
    botones: [
      {
        id: "detener",
        texto: "DETENER",
        color: "#43b53f",
        icono: "mano",
        textoConsecuencia: "Somorra sobrevive el ataque de Nueva Alexandria.\nEres un Heroe para la poblacion.",
        siguiente: 1//null
      },
      {
        id: "detonar",
        texto: "DETONAR",
        color: "#d32f2f",
        icono: "radiacion",
        porDefecto: true,
        textoConsecuencia: "Somorra cae,\njunto con 5 millones de vidas que terminan aquí.",
        siguiente: 1//null
      }
    ]
  }
];

/* ============================================================================
   2. REFERENCIAS AL DOM
   ============================================================================ */
const el = {
  pantallaCarga: document.getElementById('pantalla-carga'),
  barraDescenso: document.getElementById('barra-descenso'),
  textoCiudad: document.getElementById('texto-ciudad'),
  textoPoblacion: document.getElementById('texto-poblacion'),
  textoFecha: document.getElementById('texto-fecha'),
  escena: document.getElementById('escena'),
  imgCiudad: document.getElementById('img-ciudad'),
  imgBomba: document.getElementById('img-bomba'),
  imgExplosion: document.getElementById('img-explosion'),
  iconoAlerta: document.getElementById('icono-alerta'),
  botonInfo: document.getElementById('boton-info'),
  botonesInferiores: document.getElementById('botones-inferiores'),
  panelDocumentos: document.getElementById('panel-documentos'),
  botonCerrarDocumentos: document.getElementById('boton-cerrar-documentos'),
  imagenDocumento: document.getElementById('imagen-documento'),
  mensajeSinDocumentos: document.getElementById('mensaje-sin-documentos'),
  flechaIzquierda: document.getElementById('flecha-izquierda'),
  flechaDerecha: document.getElementById('flecha-derecha'),
  indicadorDocumentos: document.getElementById('indicador-documentos'),
  capaDestello: document.getElementById('capa-destello'),
  capaNegra: document.getElementById('capa-negra'),
  textoConsecuencia: document.getElementById('texto-consecuencia'),
  botonContinuar: document.getElementById('boton-continuar'),
  pantallaJuego: document.getElementById('pantalla-juego')
};

/* ============================================================================
   3. SONIDOS
   ============================================================================ */
const Sonido = (function(){
  let ambiente = null;
  let alarma = null;
  let audioCtx = null;

  function reproducirLoop(ruta){
    try{
      const audio = new Audio(ruta);
      audio.loop = true;
      audio.volume = 0.55;
      audio.play().catch(function(){ /* reproducción bloqueada por el navegador */ });
      return audio;
    }catch(e){ return null; }
  }

  function detener(audio){
    if(!audio) return;
    try{ audio.pause(); audio.currentTime = 0; }catch(e){}
  }

  return {
    iniciarAmbiente: function(ruta){ detener(ambiente); ambiente = reproducirLoop(ruta); },
    iniciarAlarma: function(ruta){ detener(alarma); alarma = reproducirLoop(ruta); },
    detenerAmbiente: function(){ detener(ambiente); ambiente = null; },
    detenerAlarma: function(){ detener(alarma); alarma = null; },
    detenerTodo: function(){ detener(ambiente); detener(alarma); ambiente = null; alarma = null; },
    explosion: function(){
      try{
        const audio = new Audio('src/sonidoexplosión.mp3');
        audio.volume = 0.8;
        audio.play().catch(function(){});
      }catch(e){}
    },
    click: function(){
      try{
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = 620;
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.08);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
      }catch(e){}
    }
  };
})();

/* ============================================================================
   4. PERSISTENCIA (localStorage)
   ============================================================================ */
const CLAVE_GUARDADO = 'novelaVisual_partida';

function estadoInicial(){
  return {
    lineaTemporalActual: "A",
    lineasTemporales: {
      "A": {
        capituloActual: CAPITULOS[0].id,
        fechaActual: CAPITULOS[0].fecha,
        decisiones: {},
        capitulosJugados: []
      }
    }
  };
}

function cargarPartida(){
  try{
    const guardado = localStorage.getItem(CLAVE_GUARDADO);
    if(!guardado) return estadoInicial();
    const datos = JSON.parse(guardado);
    if(!datos.lineasTemporales || !datos.lineaTemporalActual) return estadoInicial();
    return datos;
  }catch(e){
    return estadoInicial();
  }
}

function guardarPartida(){
  try{
    localStorage.setItem(CLAVE_GUARDADO, JSON.stringify(partida));
  }catch(e){ /* almacenamiento no disponible: el juego continúa sin persistencia */ }
}

function lineaActual(){
  return partida.lineasTemporales[partida.lineaTemporalActual];
}

let partida = cargarPartida();

/* ============================================================================
   5. UTILIDADES DEL MOTOR
   ============================================================================ */
function obtenerCapituloPorId(id){
  return CAPITULOS.find(function(c){ return c.id === id; }) || null;
}

function siguienteCapituloDisponible(){
  const linea = lineaActual();
  for(let i=0;i<CAPITULOS.length;i++){
    if(linea.capitulosJugados.indexOf(CAPITULOS[i].id) === -1){
      return CAPITULOS[i].id;
    }
  }
  return null;
}

function iniciarViajeTemporal(fechaIntroducida){
  const capituloDestino = CAPITULOS.find(function(c){ return c.fecha === fechaIntroducida; });
  if(!capituloDestino) return false;

  const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  let nuevaLetra = null;
  for(let i=0;i<letras.length;i++){
    if(!partida.lineasTemporales[letras[i]]){ nuevaLetra = letras[i]; break; }
  }
  if(!nuevaLetra) return false;

  partida.lineasTemporales[nuevaLetra] = {
    capituloActual: capituloDestino.id,
    fechaActual: capituloDestino.fecha,
    decisiones: {},
    capitulosJugados: []
  };
  partida.lineaTemporalActual = nuevaLetra;
  guardarPartida();
  return true;
}
window.iniciarViajeTemporal = iniciarViajeTemporal;

/* ============================================================================
   6. ANIMACIÓN DEL MISIL
   ============================================================================ */
const Mision = (function(){
  let capituloActivo = null;
  let inicio = null;
  let acumulado = 0;
  let enPausa = false;
  let animando = false;
  let idFrame = null;
  let resuelta = false;

  const RANGO_SUPERIOR = 22;
  const RANGO_INFERIOR = 66;

  function frame(marcaTiempo){
    if(enPausa || resuelta) return;
    if(inicio === null) inicio = marcaTiempo - acumulado;
    const transcurrido = marcaTiempo - inicio;
    const progreso = Math.min(transcurrido / capituloActivo.tiempoDescenso, 1);

    aplicarProgreso(progreso);

    if(progreso >= 1){
      resuelta = true;
      manejarImpactoPorDefecto();
      return;
    }
    idFrame = requestAnimationFrame(frame);
  }

  function aplicarProgreso(progreso){
    const top = RANGO_SUPERIOR + (RANGO_INFERIOR - RANGO_SUPERIOR) * progreso;
    const escala = 1 + progreso * 0.55;
    el.imgBomba.style.top = top + "%";
    el.imgBomba.style.transform = "translate(-50%,0) scale(" + escala.toFixed(3) + ")";
    el.barraDescenso.style.width = (progreso * 100) + "%";
  }

  function manejarImpactoPorDefecto(){
    // Sin decisión del jugador, se ejecuta el botón "porDefecto" (DETONAR),
    // recorriendo exactamente el mismo camino visual que una detonación
    // manual (incluida la sustitución por la imagen de explosión).
    const botonPorDefecto = capituloActivo.botones.find(function(b){ return b.porDefecto; })
                             || capituloActivo.botones[0];
    Motor.resolverDecision(capituloActivo, botonPorDefecto);
  }

  return {
    iniciar: function(capitulo){
      capituloActivo = capitulo;
      inicio = null;
      acumulado = 0;
      enPausa = false;
      resuelta = false;
      animando = true;
      idFrame = requestAnimationFrame(frame);
    },
    pausar: function(){
      if(!animando || enPausa) return;
      enPausa = true;
      if(idFrame) cancelAnimationFrame(idFrame);
      acumulado = inicio !== null ? performance.now() - inicio : 0;
    },
    reanudar: function(){
      if(!animando || !enPausa || resuelta) return;
      enPausa = false;
      inicio = null;
      idFrame = requestAnimationFrame(frame);
    },
    detener: function(){
      animando = false;
      resuelta = true;
      if(idFrame) cancelAnimationFrame(idFrame);
    },
    marcarResuelta: function(){ resuelta = true; if(idFrame) cancelAnimationFrame(idFrame); }
  };
})();

/* ============================================================================
   7. INTERFAZ — Renderizado de cada capítulo
   ============================================================================ */
function renderizarEncabezado(capitulo){
  el.textoCiudad.textContent = "CIUDAD: " + capitulo.ciudad.toUpperCase();
  el.textoPoblacion.textContent = "POBLACIÓN: " + capitulo.poblacion.toUpperCase();
  el.textoFecha.textContent = capitulo.fecha.toUpperCase();
}

function renderizarEscena(capitulo){
  el.escena.style.backgroundImage = "url('" + capitulo.fondo + "')";
  el.escena.style.backgroundColor = capitulo.colorCielo;

  // Se restauran ciudad y misil por si el capítulo anterior terminó en
  // explosión (donde ambos quedaron ocultos).
  el.imgCiudad.src = capitulo.ciudadPNG;
  el.imgCiudad.style.opacity = '1';
  el.imgBomba.src = capitulo.bombaPNG;
  el.imgBomba.style.opacity = '1';
  el.imgBomba.style.top = "22%";
  el.imgBomba.style.transform = "translate(-50%,0) scale(1)";
  el.imgExplosion.classList.remove('visible');

  el.barraDescenso.style.width = "0%";
}

function renderizarBotonInfo(capitulo){
  el.botonInfo.style.background = capitulo.colorInfo;
}

const ICONOS = {
  mano: '<svg viewBox="0 0 24 24" fill="none"><path d="M8 12V5.5a1.5 1.5 0 0 1 3 0V11m0-6a1.5 1.5 0 0 1 3 0v6m0-5a1.5 1.5 0 0 1 3 0v6m-9 1v-2a1.5 1.5 0 0 0-3 0v3c0 3.5 2.5 7 7 7h1c3.5 0 6-2.5 6-6v-4a1.5 1.5 0 0 0-3 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  radiacion: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="2.2" fill="#fff"/><path d="M12 2v6.2M12 22v-6.2M2.5 17l5.4-3.1M21.5 7l-5.4 3.1M2.5 7l5.4 3.1M21.5 17l-5.4-3.1" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>',
  generico: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="#fff" stroke-width="2"/></svg>'
};

function renderizarBotonesInferiores(capitulo){
  el.botonesInferiores.innerHTML = "";
  capitulo.botones.forEach(function(boton){
    const btn = document.createElement('button');
    btn.className = 'boton-decision';
    btn.innerHTML =
      '<span class="circulo-boton" style="background:' + boton.color + '">' +
        (ICONOS[boton.icono] || ICONOS.generico) +
      '</span>' +
      '<span class="etiqueta-boton">' + boton.texto + '</span>';
    btn.addEventListener('click', function(){
      Sonido.click();
      Motor.resolverDecision(capitulo, boton);
    });
    el.botonesInferiores.appendChild(btn);
  });
  el.botonesInferiores.classList.remove('oculto');
}

/* ============================================================================
   8. PANEL DE DOCUMENTOS (carrusel)
   ============================================================================ */
const Carrusel = (function(){
  let documentos = [];
  let indice = 0;

  function render(){
    if(documentos.length === 0){
      el.imagenDocumento.style.display = 'none';
      el.mensajeSinDocumentos.style.display = 'block';
      el.flechaIzquierda.disabled = true;
      el.flechaDerecha.disabled = true;
      el.indicadorDocumentos.textContent = "";
      return;
    }
    el.imagenDocumento.style.display = 'block';
    el.mensajeSinDocumentos.style.display = 'none';
    el.imagenDocumento.style.opacity = 0;
    requestAnimationFrame(function(){
      el.imagenDocumento.src = documentos[indice];
      el.imagenDocumento.style.opacity = 1;
    });
    el.flechaIzquierda.disabled = (indice === 0);
    el.flechaDerecha.disabled = (indice === documentos.length - 1);
    el.indicadorDocumentos.textContent = (indice + 1) + " / " + documentos.length;
  }

  return {
    cargar: function(listaDocumentos){
      documentos = listaDocumentos || [];
      indice = 0;
      render();
    },
    anterior: function(){ if(indice > 0){ indice--; render(); } },
    siguiente: function(){ if(indice < documentos.length - 1){ indice++; render(); } }
  };
})();

el.flechaIzquierda.addEventListener('click', function(){ Sonido.click(); Carrusel.anterior(); });
el.flechaDerecha.addEventListener('click', function(){ Sonido.click(); Carrusel.siguiente(); });

el.botonInfo.addEventListener('click', function(){
  Sonido.click();
  Motor.abrirDocumentos();
});
el.botonCerrarDocumentos.addEventListener('click', function(){
  Sonido.click();
  Motor.cerrarDocumentos();
});

/* ============================================================================
   9. TRANSICIONES (fade, destello blanco, vibración, pantalla negra)
   ============================================================================ */
const Transiciones = {
  destelloBlanco: function(){
    return new Promise(function(resolve){
      el.capaDestello.style.transition = 'opacity .12s ease';
      el.capaDestello.style.opacity = '1';
      setTimeout(function(){
        el.capaDestello.style.transition = 'opacity .5s ease';
        el.capaDestello.style.opacity = '0';
        setTimeout(resolve, 500);
      }, 120);
    });
  },
  vibrar: function(){
    el.pantallaJuego.classList.add('vibrando');
    if(navigator.vibrate) { try{ navigator.vibrate([80,40,80]); }catch(e){} }
    setTimeout(function(){ el.pantallaJuego.classList.remove('vibrando'); }, 800);
  },
  // Muestra el texto de consecuencia y espera a que el jugador pulse
  // "Continuar" en vez de avanzar solo tras un tiempo fijo.
  mostrarConsecuencia: function(texto){
    return new Promise(function(resolve){
      el.textoConsecuencia.textContent = texto;
      el.capaNegra.classList.add('visible');

      setTimeout(function(){
        el.textoConsecuencia.classList.add('visible');
        el.botonContinuar.classList.add('visible');
      }, 300);

      function manejarClic(){
        el.botonContinuar.removeEventListener('click', manejarClic);
        Sonido.click();
        resolve();
      }
      el.botonContinuar.addEventListener('click', manejarClic);
    });
  },
  ocultarConsecuencia: function(){
    return new Promise(function(resolve){
      el.textoConsecuencia.classList.remove('visible');
      el.botonContinuar.classList.remove('visible');
      setTimeout(function(){
        el.capaNegra.classList.remove('visible');
        setTimeout(resolve, 800);
      }, 400);
    });
  }
};

/* ============================================================================
   10. MOTOR NARRATIVO PRINCIPAL
   ============================================================================ */
const Motor = {

  iniciarCapitulo: function(id){
    const capitulo = obtenerCapituloPorId(id);
    if(!capitulo){
      Motor.mostrarFinDisponible();
      return;
    }

    renderizarEncabezado(capitulo);
    renderizarEscena(capitulo);
    renderizarBotonInfo(capitulo);
    renderizarBotonesInferiores(capitulo);
    el.botonesInferiores.classList.remove('oculto');
    el.iconoAlerta.classList.add('activo');

    Sonido.iniciarAmbiente(capitulo.sonidoAmbiente);
    Sonido.iniciarAlarma(capitulo.sonidoAlarma);

    Mision.iniciar(capitulo);

    const linea = lineaActual();
    linea.capituloActual = capitulo.id;
    linea.fechaActual = capitulo.fecha;
    guardarPartida();
  },

  abrirDocumentos: function(){
    Mision.pausar();
    el.botonesInferiores.classList.add('oculto');
    const capitulo = obtenerCapituloPorId(lineaActual().capituloActual);
    Carrusel.cargar(capitulo.documentos);
    el.panelDocumentos.classList.add('visible');
  },

  cerrarDocumentos: function(){
    el.panelDocumentos.classList.remove('visible');
    el.botonesInferiores.classList.remove('oculto');
    Mision.reanudar();
  },

  resolverDecision: function(capitulo, boton){
    Mision.marcarResuelta();
    el.botonesInferiores.classList.add('oculto');
    el.iconoAlerta.classList.remove('activo');
    Sonido.detenerAlarma();

    const linea = lineaActual();
    linea.decisiones["capitulo" + capitulo.id] = boton.id;
    if(linea.capitulosJugados.indexOf(capitulo.id) === -1){
      linea.capitulosJugados.push(capitulo.id);
    }
    guardarPartida();

    const esDetonacion = (boton.id === 'detonar' || boton.porDefecto === true);

    let secuencia;
    if(esDetonacion){
      // La ciudad y el misil desaparecen y son reemplazados por la
      // explosión real (src/explosion.png), tanto al detonar como al
      // dejar que el misil impacte por defecto.
      el.imgBomba.style.opacity = '0';
      el.imgCiudad.style.opacity = '0';
      el.imgExplosion.src = 'src/explosion.png';
      el.imgExplosion.classList.add('visible');
      Sonido.explosion();
      Transiciones.vibrar();
      secuencia = Transiciones.destelloBlanco();
    } else {
      // Efecto de "desactivado": se sustituye la bomba activa por la
      // versión apagada del mismo capítulo.
      if(capitulo.bombaPNGDetenida){ el.imgBomba.src = capitulo.bombaPNGDetenida; }
      secuencia = Promise.resolve();
    }

    secuencia
      .then(function(){
        return Transiciones.mostrarConsecuencia(boton.textoConsecuencia || "");
      })
      .then(function(){
        return Transiciones.ocultarConsecuencia();
      })
      .then(function(){
        Sonido.detenerAmbiente();
        Motor.avanzar(boton.siguiente);
      });
  },

  avanzar: function(idSiguiente){
    const linea = lineaActual();

    if(idSiguiente === null || idSiguiente === undefined){
      Motor.mostrarFinDisponible();
      return;
    }

    if(linea.capitulosJugados.indexOf(idSiguiente) !== -1){
      const disponible = siguienteCapituloDisponible();
      if(disponible === null){
        Motor.mostrarFinDisponible();
        return;
      }
      Motor.iniciarCapitulo(disponible);
      return;
    }

    Motor.iniciarCapitulo(idSiguiente);
  },

  mostrarFinDisponible: function(){
    el.iconoAlerta.classList.remove('activo');
    el.textoCiudad.textContent = "";
    el.textoPoblacion.textContent = "";
    el.textoFecha.textContent = "";
    el.imgBomba.style.display = 'none';
    el.botonContinuar.classList.remove('visible');
    el.capaNegra.classList.add('visible');
    el.textoConsecuencia.textContent = "Continuará…\n\nNo hay más capítulos disponibles en esta línea temporal.";
    el.textoConsecuencia.classList.add('visible');
  },

  arrancar: function(){
    const linea = lineaActual();
    let idInicial = linea.capituloActual;

    if(linea.capitulosJugados.indexOf(idInicial) !== -1){
      const disponible = siguienteCapituloDisponible();
      idInicial = disponible;
    }

    if(idInicial === null){
      Motor.mostrarFinDisponible();
      return;
    }
    Motor.iniciarCapitulo(idInicial);
  }
};

/* ============================================================================
   11. ARRANQUE
   ----------------------------------------------------------------------------
   El juego NO arranca solo al cargar la página: espera un toque del
   jugador en "TOCA PARA COMENZAR". Ese toque es el gesto de usuario que
   los navegadores exigen para reproducir audio con sonido, por lo que el
   ambiente y la alarma ahora también suenan desde el capítulo 1.
   ============================================================================ */
function comenzarJuego(){
  el.pantallaCarga.removeEventListener('click', comenzarJuego);
  el.pantallaCarga.style.opacity = '0';
  setTimeout(function(){ el.pantallaCarga.style.display = 'none'; }, 400);
  Motor.arrancar();
}
el.pantallaCarga.addEventListener('click', comenzarJuego);

})();
</script>
